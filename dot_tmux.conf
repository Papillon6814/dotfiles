# =============================================================================
# tmux.conf - Zellij互換モーダルキーバインド
# =============================================================================

# --- 基本設定 ----------------------------------------------------------------

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-ghostty:Tc"
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g history-limit 50000
set -g mode-keys vi
set -g status-keys vi
set -g focus-events on
set -s extended-keys always
set -s extended-keys-format csi-u
set -as terminal-features 'xterm-ghostty:extkeys'
set -g monitor-bell on
set -g bell-action other
set -g visual-bell off

# prefix キーを無効化 (全て Key Table で制御)
if-shell 'tmux list-keys -T prefix 2>/dev/null' 'unbind -a -T prefix'
set -g prefix None

# --- ステータスバー ----------------------------------------------------------

set -g status-position top
set -g status-interval 1
set -g status-style "bg=#181825,fg=#bac2de"

# 左: モード表示
set -g status-left-length 20
set -g status-left "\
#{?#{==:#{client_key_table},off},#[bg=#f38ba8#,fg=#11111b#,bold] LOCKED ,\
#{?#{==:#{client_key_table},pane},#[bg=#89b4fa#,fg=#11111b#,bold] PANE ,\
#{?#{==:#{client_key_table},tab},#[bg=#fab387#,fg=#11111b#,bold] TAB ,\
#{?#{==:#{client_key_table},resize},#[bg=#f9e2af#,fg=#11111b#,bold] RESIZE ,\
#{?#{==:#{client_key_table},session},#[bg=#cba6f7#,fg=#11111b#,bold] SESSION ,\
#{?#{==:#{client_key_table},tmux_compat},#[bg=#a6e3a1#,fg=#11111b#,bold] TMUX ,\
#[bg=#181825#,fg=#bac2de] NORMAL }}}}}} "

# 右: セッション名
set -g status-right-length 30
set -g status-right "#[fg=#bac2de] #S "

# ウィンドウ (タブ) リスト
set -g window-status-format "#{?window_bell_flag,#[bg=#f9e2af#,fg=#11111b#,bold] #I:#W , #I:#W }"
set -g window-status-current-format "#[bg=#45475a,fg=#cdd6f4,bold] #I:#W#{?window_zoomed_flag, [Z],} "
set -g window-status-separator ""

# ペインボーダー
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[fg=#89b4fa] #P: #{pane_title} ,#[fg=#9399b2] #P: #{pane_title} }"

# =============================================================================
# Root テーブル (= Zellij Normal mode)
# =============================================================================

# ペイン移動 (Zellij shared セクション相当)
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# タブ移動 (Ctrl+Shift+H/L)
bind -n C-S-h previous-window
bind -n C-S-l next-window

# ペインを閉じる
bind -n C-w kill-pane

# C-q: Normal mode (何もしない)
bind -n C-q display-message ""

# モード切替
bind -n C-g set key-table off \; refresh-client -S
bind -n C-p switch-client -T pane
bind -n C-n switch-client -T resize
bind -n C-s copy-mode
bind -n C-o switch-client -T session
bind -n C-t switch-client -T tab
bind -n C-b switch-client -T tmux_compat

# Alt ショートカット (Zellij shared_except "locked" 相当)
bind -n M-n split-window -c "#{pane_current_path}"
bind -n M-i swap-window -t -1 \; select-window -t -1
bind -n M-o swap-window -t +1 \; select-window -t +1
bind -n M-= resize-pane -R 2 \; resize-pane -D 2
bind -n M-- resize-pane -L 2 \; resize-pane -U 2
bind -n M-[ select-layout -p
bind -n M-] next-layout

# =============================================================================
# Locked mode (off テーブル) - 全キーをアプリケーションにパススルー
# =============================================================================

bind -T off C-g set -u key-table \; refresh-client -S
bind -T off C-q set -u key-table \; refresh-client -S

# =============================================================================
# Pane mode (C-p)
# =============================================================================

# ナビゲーション (モードに留まる)
bind -T pane h     select-pane -L \; switch-client -T pane
bind -T pane j     select-pane -D \; switch-client -T pane
bind -T pane k     select-pane -U \; switch-client -T pane
bind -T pane l     select-pane -R \; switch-client -T pane
bind -T pane Left  select-pane -L \; switch-client -T pane
bind -T pane Down  select-pane -D \; switch-client -T pane
bind -T pane Up    select-pane -U \; switch-client -T pane
bind -T pane Right select-pane -R \; switch-client -T pane
bind -T pane p     select-pane -t :.+ \; switch-client -T pane

# 分割 (Ctrl + 方向キー)
bind -T pane C-j split-window -v -c "#{pane_current_path}"
bind -T pane C-l split-window -h -c "#{pane_current_path}"

# アクション (root に戻る)
bind -T pane r command-prompt -p "rename pane:" "select-pane -T '%%'"
bind -T pane x kill-pane
bind -T pane f resize-pane -Z

# ペイン入れ替え (Move mode 代替、モードに留まる)
bind -T pane S swap-pane -U \; switch-client -T pane
bind -T pane s swap-pane -D \; switch-client -T pane

# モード終了
bind -T pane Escape switch-client -T root
bind -T pane Enter  switch-client -T root
bind -T pane q      switch-client -T root
bind -T pane C-p    switch-client -T root

# クロスモード切替 (Zellij shared_except 相当)
bind -T pane C-t switch-client -T tab
bind -T pane C-n switch-client -T resize
bind -T pane C-s copy-mode
bind -T pane C-o switch-client -T session
bind -T pane C-b switch-client -T tmux_compat
bind -T pane C-g set key-table off \; refresh-client -S

# =============================================================================
# Tab mode (C-t) — tmux "window" = Zellij "tab"
# =============================================================================

# ナビゲーション (モードに留まる、端でラップしない)
bind -T tab h     if-shell -F '#{!=:#{window_index},1}' 'previous-window ; switch-client -T tab' 'switch-client -T tab'
bind -T tab l     if-shell -F '#{!=:#{window_index},#{session_windows}}' 'next-window ; switch-client -T tab' 'switch-client -T tab'
bind -T tab k     if-shell -F '#{!=:#{window_index},1}' 'previous-window ; switch-client -T tab' 'switch-client -T tab'
bind -T tab j     if-shell -F '#{!=:#{window_index},#{session_windows}}' 'next-window ; switch-client -T tab' 'switch-client -T tab'
bind -T tab Left  if-shell -F '#{!=:#{window_index},1}' 'previous-window ; switch-client -T tab' 'switch-client -T tab'
bind -T tab Right if-shell -F '#{!=:#{window_index},#{session_windows}}' 'next-window ; switch-client -T tab' 'switch-client -T tab'
bind -T tab Up    if-shell -F '#{!=:#{window_index},1}' 'previous-window ; switch-client -T tab' 'switch-client -T tab'
bind -T tab Down  if-shell -F '#{!=:#{window_index},#{session_windows}}' 'next-window ; switch-client -T tab' 'switch-client -T tab'

# アクション (root に戻る)
bind -T tab n   new-window -c "#{pane_current_path}"
bind -T tab x   confirm-before -p "Kill window #W? (y/n)" kill-window
bind -T tab r   command-prompt -p "rename tab:" "rename-window '%%'"
bind -T tab s   set synchronize-panes
bind -T tab i   swap-window -t -1 \; select-window -t -1
bind -T tab o   swap-window -t +1 \; select-window -t +1
bind -T tab b   break-pane
bind -T tab Tab last-window
bind -T tab 1   select-window -t :1
bind -T tab 2   select-window -t :2
bind -T tab 3   select-window -t :3
bind -T tab 4   select-window -t :4
bind -T tab 5   select-window -t :5
bind -T tab 6   select-window -t :6
bind -T tab 7   select-window -t :7
bind -T tab 8   select-window -t :8
bind -T tab 9   select-window -t :9

# モード終了
bind -T tab Escape switch-client -T root
bind -T tab Enter  switch-client -T root
bind -T tab q      switch-client -T root
bind -T tab C-t    switch-client -T root

# クロスモード切替
bind -T tab C-p switch-client -T pane
bind -T tab C-n switch-client -T resize
bind -T tab C-s copy-mode
bind -T tab C-o switch-client -T session
bind -T tab C-b switch-client -T tmux_compat
bind -T tab C-g set key-table off \; refresh-client -S

# =============================================================================
# Resize mode (C-n) - 連続リサイズ対応
# =============================================================================

bind -T resize h     resize-pane -L 2 \; switch-client -T resize
bind -T resize j     resize-pane -D 2 \; switch-client -T resize
bind -T resize k     resize-pane -U 2 \; switch-client -T resize
bind -T resize l     resize-pane -R 2 \; switch-client -T resize
bind -T resize H     resize-pane -R 2 \; switch-client -T resize
bind -T resize J     resize-pane -U 2 \; switch-client -T resize
bind -T resize K     resize-pane -D 2 \; switch-client -T resize
bind -T resize L     resize-pane -L 2 \; switch-client -T resize
bind -T resize Left  resize-pane -L 2 \; switch-client -T resize
bind -T resize Down  resize-pane -D 2 \; switch-client -T resize
bind -T resize Up    resize-pane -U 2 \; switch-client -T resize
bind -T resize Right resize-pane -R 2 \; switch-client -T resize
bind -T resize =     resize-pane -R 2 \; resize-pane -D 2 \; switch-client -T resize
bind -T resize +     resize-pane -R 2 \; resize-pane -D 2 \; switch-client -T resize
bind -T resize -     resize-pane -L 2 \; resize-pane -U 2 \; switch-client -T resize

# モード終了
bind -T resize Escape switch-client -T root
bind -T resize Enter  switch-client -T root
bind -T resize q      switch-client -T root
bind -T resize C-n    switch-client -T root

# クロスモード切替
bind -T resize C-p switch-client -T pane
bind -T resize C-t switch-client -T tab
bind -T resize C-s copy-mode
bind -T resize C-o switch-client -T session
bind -T resize C-b switch-client -T tmux_compat
bind -T resize C-g set key-table off \; refresh-client -S

# =============================================================================
# Scroll / Copy mode (C-s → copy-mode-vi)
# =============================================================================

# tmux 組み込みの copy-mode-vi を使用。追加バインドのみ。
bind -T copy-mode-vi s   command-prompt -i -p "search:" "send -X search-forward-incremental \"%%%\""
bind -T copy-mode-vi C-s send -X cancel
bind -T copy-mode-vi C-c send -X bottom-line \; send -X cancel
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-selection-and-cancel

# =============================================================================
# Session mode (C-o)
# =============================================================================

bind -T session d   detach-client
bind -T session w   choose-tree -s
bind -T session C-s copy-mode

# モード終了
bind -T session Escape switch-client -T root
bind -T session Enter  switch-client -T root
bind -T session q      switch-client -T root
bind -T session C-o    switch-client -T root

# クロスモード切替
bind -T session C-p switch-client -T pane
bind -T session C-t switch-client -T tab
bind -T session C-n switch-client -T resize
bind -T session C-b switch-client -T tmux_compat
bind -T session C-g set key-table off \; refresh-client -S

# =============================================================================
# Tmux 互換モード (C-b) - 従来の tmux キーバインド
# =============================================================================

bind -T tmux_compat '"'   split-window -v -c "#{pane_current_path}"
bind -T tmux_compat %     split-window -h -c "#{pane_current_path}"
bind -T tmux_compat z     resize-pane -Z
bind -T tmux_compat c     new-window -c "#{pane_current_path}"
bind -T tmux_compat ','   command-prompt -p "rename window:" "rename-window '%%'"
bind -T tmux_compat p     if-shell -F '#{!=:#{window_index},1}' 'previous-window'
bind -T tmux_compat n     if-shell -F '#{!=:#{window_index},#{session_windows}}' 'next-window'
bind -T tmux_compat h     select-pane -L
bind -T tmux_compat j     select-pane -D
bind -T tmux_compat k     select-pane -U
bind -T tmux_compat l     select-pane -R
bind -T tmux_compat Left  select-pane -L
bind -T tmux_compat Down  select-pane -D
bind -T tmux_compat Up    select-pane -U
bind -T tmux_compat Right select-pane -R
bind -T tmux_compat o     select-pane -t :.+
bind -T tmux_compat d     detach-client
bind -T tmux_compat Space next-layout
bind -T tmux_compat x     kill-pane
bind -T tmux_compat '['   copy-mode
bind -T tmux_compat C-b   send-keys C-b
bind -T tmux_compat 1     select-window -t :1
bind -T tmux_compat 2     select-window -t :2
bind -T tmux_compat 3     select-window -t :3
bind -T tmux_compat 4     select-window -t :4
bind -T tmux_compat 5     select-window -t :5
bind -T tmux_compat 6     select-window -t :6
bind -T tmux_compat 7     select-window -t :7
bind -T tmux_compat 8     select-window -t :8
bind -T tmux_compat 9     select-window -t :9

# モード終了
bind -T tmux_compat Escape switch-client -T root
bind -T tmux_compat Enter  switch-client -T root
bind -T tmux_compat q      switch-client -T root
